name: OpenWhisp

options:
  bundleIdPrefix: app.openwhisp.ios
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  # .xcodeproj is generated by `scripts/bootstrap.sh` and git-ignored (decision D2).
  # Info.plist and .entitlements files are GENERATED by XcodeGen from the
  # `info`/`entitlements` blocks below — they are the single source of truth and
  # are git-ignored so they never drift from this spec.

# Local SwiftPM package holding all shared logic (ARCHITECTURE §2).
packages:
  OpenWhispMobileKit:
    path: Packages/OpenWhispMobileKit

# Signing: automatic, team taken from the DEVELOPMENT_TEAM environment variable
# (never hardcoded). Simulator builds succeed unsigned (CODE_SIGNING_ALLOWED=NO),
# so CI needs no team at all.
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  # MARK: - Host app (the engine)
  OpenWhisp:
    type: application
    platform: iOS
    sources:
      - path: Apps/HostApp
      # Shared App Intents (hero flow): compiled into BOTH the host app and the
      # widgets extension so the Live Activity + Control Center can reference the
      # intent types (ARCHITECTURE §5.1).
      - path: Apps/Shared/Intents
      # Engine Lab benchmark fixtures (WP3). Bundled as a folder reference under a
      # `Fixtures/` group so the app can resolve `<name>.wav` / `<name>.txt` by
      # `Bundle.main.url(...subdirectory: "Fixtures")`. To keep the RELEASE app size
      # sane, the whole group is EXCLUDED from the Release config via
      # `EXCLUDED_SOURCE_FILE_NAMES` below — so fixtures ship only in Debug builds,
      # which is where the Engine Lab is used. (Documented in docs/ARCHITECTURE.md §7
      # and docs/ENGINE_LAB.md.)
      - path: fixtures/audio
        name: Fixtures
        type: folder
        buildPhase: resources
    info:
      path: Apps/HostApp/Info.plist
      properties:
        CFBundleDisplayName: OpenWhisp
        UILaunchScreen: {}
        # Floor-flow deep link (ARCHITECTURE §5.2): opening `openwhisp://dictate`
        # presents the compact dictation sheet. Parsed by the tested `DeepLink`
        # router. NOTE: the keyboard extension CANNOT open this URL [C9] — in
        # production it is delivered by a user Shortcut / Home-Screen action; on the
        # simulator by `xcrun simctl openurl booted openwhisp://dictate`.
        CFBundleURLTypes:
          - CFBundleURLName: app.openwhisp.ios.dictate
            CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - openwhisp
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: >-
          OpenWhisp records audio on-device to transcribe your speech. Audio never leaves your phone.
        # Apple's on-device speech recognizer is used ONLY by the developer Engine
        # Lab (Settings → Developer → Engine Lab) to benchmark OpenWhisp's on-device
        # engines against Apple's, on the same audio. Recognition is forced
        # on-device (requiresOnDeviceRecognition = true); no dictated text is ever
        # sent to Apple's servers, and no production path uses this recognizer.
        NSSpeechRecognitionUsageDescription: >-
          Used only by the developer Engine Lab to benchmark OpenWhisp against Apple's on-device recognizer. Runs on-device; nothing is sent to Apple.
        NSLocalNetworkUsageDescription: >-
          OpenWhisp connects to your paired Mac over your local Wi-Fi to sync your vocabulary and history. Nothing goes to the cloud.
        NSCameraUsageDescription: >-
          OpenWhisp uses the camera to scan the pairing QR code shown by your Mac.
        NSBonjourServices:
          - _openwhisp._tcp
        NSSupportsLiveActivities: true
    entitlements:
      path: Apps/HostApp/OpenWhisp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.openwhisp.ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios
        TARGETED_DEVICE_FAMILY: "1,2"
    # Engine Lab fixtures ship in Debug only (to keep the RELEASE app size sane).
    # `EXCLUDED_SOURCE_FILE_NAMES` doesn't reliably drop a folder-reference resource,
    # so a Release-config post-build script strips the bundled `audio/` fixtures out
    # of the product. In Debug the script is a no-op; in Release it removes them.
    # Documented in docs/ARCHITECTURE.md §7 and docs/ENGINE_LAB.md.
    postBuildScripts:
      - name: Strip Engine Lab fixtures (Release only)
        script: |
          if [ "${CONFIGURATION}" = "Release" ]; then
            FIX="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/audio"
            if [ -d "$FIX" ]; then
              echo "Release build: stripping Engine Lab fixtures at $FIX"
              rm -rf "$FIX"
            fi
          else
            echo "Debug build: keeping Engine Lab fixtures."
          fi
    dependencies:
      - package: OpenWhispMobileKit
        product: MobileCore
      - package: OpenWhispMobileKit
        product: KeyboardCore
      - package: OpenWhispMobileKit
        product: CaptureKit
      - package: OpenWhispMobileKit
        product: SyncKit
      - target: OpenWhispKeyboard
      - target: OpenWhispWidgets

  # MARK: - Keyboard extension (thin; inserts finished text)
  OpenWhispKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Apps/KeyboardExtension
    info:
      path: Apps/KeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenWhisp
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            # Full Access unlocks App Group reads + LAN sync (constraint C2). The
            # keyboard is fully functional as a plain keyboard with this OFF
            # (guideline 4.4.1); dictation is the enhancement it gates.
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    entitlements:
      path: Apps/KeyboardExtension/OpenWhispKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.openwhisp.ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.keyboard
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OpenWhispMobileKit
        product: KeyboardCore
      - package: OpenWhispMobileKit
        product: MobileCore

  # MARK: - Widgets extension (Live Activity + Control Center, stub in WP1)
  OpenWhispWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Apps/WidgetsExtension
      # Shared App Intents source (see the host app target). The widget references
      # StartDictationIntent (Control Center) + StopDictationIntent (Live Activity).
      - path: Apps/Shared/Intents
    info:
      path: Apps/WidgetsExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenWhisp
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Apps/WidgetsExtension/OpenWhispWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.openwhisp.ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OpenWhispMobileKit
        product: MobileCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: AppIntents.framework
      # ActivityKit: the widget renders the Live Activity; MobileCore's
      # `DictationActivityAttributes` conforms to `ActivityAttributes`.
      - sdk: ActivityKit.framework

  # MARK: - UI-test harness app (not shipped)
  # A tiny, dependency-free SwiftUI app that exists ONLY as a stable surface for
  # the system-keyboard typing UI test. It links nothing from the shared package
  # so its UI can never drift as the real host app evolves. Owned by the testing
  # infrastructure; never bundled into a release.
  UITestHost:
    type: application
    platform: iOS
    sources:
      - path: Apps/UITests/Host
    info:
      path: Apps/UITests/Host/Info.plist
      properties:
        CFBundleDisplayName: UITestHost
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.uitesthost
        TARGETED_DEVICE_FAMILY: "1,2"

  # MARK: - UI tests: host-app launch/home smoke (targets the REAL host app)
  OpenWhispUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Apps/UITests/HostSmoke
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.uitests
        # UI-test runners are always signed for the simulator/device; keep them
        # unsigned-friendly for CI simulator runs.
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: OpenWhisp

  # MARK: - UI tests: dictation handoff floor flow (targets the REAL host app)
  # Drives the whole dictation-sheet handoff on the simulator with the DEBUG
  # scripted fake engine (no mic/model). See Apps/UITests/Handoff.
  DictationHandoffUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Apps/UITests/Handoff
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.handoffuitests
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: OpenWhisp

  # MARK: - UI tests: system-keyboard typing (targets the harness app)
  UITestHostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Apps/UITests/Typing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.uitesthost.uitests
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: UITestHost

schemes:
  OpenWhisp:
    build:
      targets:
        OpenWhisp: all
        OpenWhispKeyboard: all
        OpenWhispWidgets: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OpenWhispUITests
  # Per-target schemes so each product target can be built on its own (used by
  # scripts/build-sim.sh and CI to prove every target builds in isolation).
  OpenWhispKeyboard:
    build:
      targets:
        OpenWhispKeyboard: all
  OpenWhispWidgets:
    build:
      targets:
        OpenWhispWidgets: all

  # MARK: - UI-test schemes (used by scripts/uitest.sh + the CI simulator job)
  # Host-app launch/home smoke against the real app.
  OpenWhispUITests:
    build:
      targets:
        OpenWhisp: all
        OpenWhispUITests: [test]
    test:
      config: Debug
      targets:
        - OpenWhispUITests
  # Dictation-handoff floor flow against the real app (scripted fake engine).
  DictationHandoffUITests:
    build:
      targets:
        OpenWhisp: all
        DictationHandoffUITests: [test]
    test:
      config: Debug
      targets:
        - DictationHandoffUITests
  # System-keyboard typing against the dedicated harness app.
  UITestHostUITests:
    build:
      targets:
        UITestHost: all
        UITestHostUITests: [test]
    test:
      config: Debug
      targets:
        - UITestHostUITests
