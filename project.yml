name: OpenWhisp

options:
  bundleIdPrefix: app.openwhisp.ios
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  # .xcodeproj is generated by `scripts/bootstrap.sh` and git-ignored (decision D2).
  # Info.plist and .entitlements files are GENERATED by XcodeGen from the
  # `info`/`entitlements` blocks below — they are the single source of truth and
  # are git-ignored so they never drift from this spec.

# Local SwiftPM package holding all shared logic (ARCHITECTURE §2).
packages:
  OpenWhispMobileKit:
    path: Packages/OpenWhispMobileKit

# Signing: automatic, team taken from the DEVELOPMENT_TEAM environment variable
# (never hardcoded). Simulator builds succeed unsigned (CODE_SIGNING_ALLOWED=NO),
# so CI needs no team at all.
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  # MARK: - Host app (the engine)
  OpenWhisp:
    type: application
    platform: iOS
    sources:
      - path: Apps/HostApp
    info:
      path: Apps/HostApp/Info.plist
      properties:
        CFBundleDisplayName: OpenWhisp
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: >-
          OpenWhisp records audio on-device to transcribe your speech. Audio never leaves your phone.
        NSLocalNetworkUsageDescription: >-
          OpenWhisp connects to your paired Mac over your local Wi-Fi to sync your vocabulary and history. Nothing goes to the cloud.
        NSCameraUsageDescription: >-
          OpenWhisp uses the camera to scan the pairing QR code shown by your Mac.
        NSBonjourServices:
          - _openwhisp._tcp
        NSSupportsLiveActivities: true
    entitlements:
      path: Apps/HostApp/OpenWhisp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.openwhisp.ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OpenWhispMobileKit
        product: MobileCore
      - package: OpenWhispMobileKit
        product: KeyboardCore
      - package: OpenWhispMobileKit
        product: CaptureKit
      - package: OpenWhispMobileKit
        product: SyncKit
      - target: OpenWhispKeyboard
      - target: OpenWhispWidgets

  # MARK: - Keyboard extension (thin; inserts finished text)
  OpenWhispKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Apps/KeyboardExtension
    info:
      path: Apps/KeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenWhisp
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            # Full Access unlocks App Group reads + LAN sync (constraint C2). The
            # keyboard is fully functional as a plain keyboard with this OFF
            # (guideline 4.4.1); dictation is the enhancement it gates.
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    entitlements:
      path: Apps/KeyboardExtension/OpenWhispKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.openwhisp.ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.keyboard
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OpenWhispMobileKit
        product: KeyboardCore
      - package: OpenWhispMobileKit
        product: MobileCore

  # MARK: - Widgets extension (Live Activity + Control Center, stub in WP1)
  OpenWhispWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Apps/WidgetsExtension
    info:
      path: Apps/WidgetsExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenWhisp
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.openwhisp.ios.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: OpenWhispMobileKit
        product: MobileCore
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

schemes:
  OpenWhisp:
    build:
      targets:
        OpenWhisp: all
        OpenWhispKeyboard: all
        OpenWhispWidgets: all
    run:
      config: Debug
    test:
      config: Debug
  # Per-target schemes so each product target can be built on its own (used by
  # scripts/build-sim.sh and CI to prove every target builds in isolation).
  OpenWhispKeyboard:
    build:
      targets:
        OpenWhispKeyboard: all
  OpenWhispWidgets:
    build:
      targets:
        OpenWhispWidgets: all
